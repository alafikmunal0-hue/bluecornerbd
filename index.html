<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Corner Bd – Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f8fafc;color:#111;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;background:#1e293b;color:white;position:sticky;top:0;z-index:999;}
header h1{color:#38bdf8;font-size:28px;}
nav a{margin-left:25px;font-weight:bold;cursor:pointer;color:white;transition:0.3s;}
nav a:hover{color:#0ea5e9;}
#searchBar{padding:8px 12px;border-radius:8px;border:none;width:300px;}
.hero{position:relative;width:100%;height:400px;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;position:absolute;opacity:0;transition:opacity 1s;}
.hero img.active{opacity:1;}
.categories{display:flex;justify-content:center;flex-wrap:wrap;margin:40px 0;}
.categories button{margin:5px 10px;padding:10px 18px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
.categories button:hover{background:#1e40af;}
.products{max-width:1400px;margin:auto;padding:20px;}
.products h2{text-align:center;font-size:32px;margin-bottom:30px;color:#2563eb;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.1);position:relative;transition:0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 25px rgba(0,0,0,0.15);}
.card img{width:100%;height:200px;object-fit:cover;}
.card h3{margin:12px 15px;font-size:18px;font-weight:600;}
.price{color:#2563eb;font-weight:bold;font-size:16px;margin:0 15px 10px;}
.sale{position:absolute;top:12px;left:12px;background:#ef4444;color:white;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;}
.out-stock{position:absolute;top:12px;right:12px;background:#6b7280;color:white;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;}
button.order-btn{background:#2563eb;color:white;border:none;padding:10px 16px;margin:0 15px 15px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:0.3s;}
button.order-btn:hover{background:#1e40af;}
#cartIcon{position:fixed;top:20px;right:20px;background:#2563eb;color:white;padding:15px 20px;border-radius:50px;cursor:pointer;z-index:1000;}
#cartIcon span{font-weight:bold;margin-left:10px;}
.container{max-width:1000px;margin:50px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
label{display:block;margin-top:15px;font-weight:bold;}
input, textarea, select{width:100%;padding:10px;margin-top:7px;border-radius:8px;border:1px solid #cbd5e1;font-size:14px;}
table{width:100%;margin-top:20px;border-collapse:collapse;font-size:14px;}
table, th, td{border:1px solid #e5e7eb;}
th, td{padding:10px;text-align:left;}
tfoot td{font-weight:bold;font-size:15px;}
button.place-order{width:100%;padding:12px;font-size:16px;margin-top:20px;}

/* Login Modal */
.modal{display:none;position:fixed;z-index:2000;left:0;top:0;width:100%;height:100%;overflow:auto;background:rgba(0,0,0,0.6);}
.modal-content{background:white;margin:80px auto;padding:25px;border-radius:12px;width:90%;max-width:400px;position:relative;}
.close{position:absolute;right:15px;top:10px;font-size:22px;font-weight:bold;cursor:pointer;}
.modal h2{margin-bottom:15px;color:#2563eb;text-align:center;}
.modal input{margin-bottom:12px;}

/* Footer */
footer{background:#1e293b;color:white;text-align:center;padding:20px;margin-top:50px;font-weight:600;}
</style>
</head>
<body>

<header>
<h1>Blue Corner Bd</h1>
<div>
<input type="text" id="searchBar" placeholder="Search products..." onkeyup="searchProducts()">
<nav style="display:inline;">
<a onclick="openLogin()">Login / Register</a>
<a href="#checkout">Checkout</a>
</nav>
</div>
</header>

<div class="hero">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231698" class="active">
<img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">
<img src="https://images.unsplash.com/photo-1606813902933-5b2f48731b06">
</div>

<div class="categories">
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Watch')">Watch</button>
<button onclick="filterCategory('Speaker')">Speaker</button>
<button onclick="filterCategory('Bag')">Bag</button>
<button onclick="filterCategory('Kettle')">Kettle</button>
</div>

<section class="products" id="productsSection">
<h2>Products</h2>
<div class="grid" id="productsGrid">
<!-- JS will render products here -->
</div>
</section>

<div id="cartIcon" onclick="scrollToCheckout()">🛒 Cart (<span id="cartCount">0</span>)</div>

<section id="checkout" class="container">
<h2>Checkout</h2>
<label>আপনার নাম *</label>
<input type="text" id="name" placeholder="আপনার নাম লিখুন">
<label>আপনার ডেলিভারি ঠিকানা *</label>
<textarea id="address" placeholder="আপনার ঠিকানা লিখুন"></textarea>
<label>আপনার মোবাইল নম্বর *</label>
<input type="text" id="phone" placeholder="01XXXXXXXXX">
<label>Notes about your order</label>
<textarea id="note" placeholder="Delivery সংক্রান্ত বিশেষ তথ্য লিখুন"></textarea>

<h2>Shipping</h2>
<select id="shipping">
<option value="outside">ঢাকা সিটির বাইরে: ৳ 130</option>
<option value="inside">ঢাকা সিটির মধ্যে: ৳ 60</option>
</select>

<h2>আপনার অর্ডার</h2>
<table>
<thead><tr><th>Product</th><th>Subtotal</th></tr></thead>
<tbody id="checkoutBody"><tr><td>Cart is empty</td><td>৳ 0</td></tr></tbody>
<tfoot>
<tr><td>Shipping</td><td id="shippingFee">৳ 0</td></tr>
<tr><td>Total</td><td id="totalPrice">৳ 0</td></tr>
</tfoot>
</table>
<button class="place-order" onclick="placeOrder()">Place Order</button>
</section>

<!-- Login Modal -->
<div id="loginModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeLogin()">&times;</span>
<h2>Login / Register</h2>
<input type="text" id="loginEmail" placeholder="Email / Phone">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="loginUser()" style="background:#2563eb;color:white;padding:10px;border:none;border-radius:8px;width:100%;font-weight:bold;">Login / Register</button>
</div>
</div>

<section class="container" id="tracking">
<h2>Order Tracking (Demo)</h2>
<label>Enter Order ID</label>
<input type="text" id="orderID" placeholder="e.g. #12345">
<button onclick="trackOrder()" style="background:#10b981;color:white;padding:10px;border:none;border-radius:8px;width:100%;font-weight:bold;margin-top:10px;">Track</button>
<p id="trackingResult" style="margin-top:10px;font-weight:bold;"></p>
</section>

<footer>© 2026 Blue Corner Bd | Trusted Online Shop</footer>

<script>
// Hero Slider
let slides=document.querySelectorAll('.hero img');let current=0;
setInterval(()=>{slides[current].classList.remove('active');current=(current+1)%slides.length;slides[current].classList.add('active');},4000);

// Products Data
let allProducts=[
{name:'Smart Watch Series X',price:2350,category:'Watch',sale:true,img:'https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b'},
{name:'KBoard Wireless Speaker',price:1250,category:'Speaker',sale:true,img:'https://images.unsplash.com/photo-1585386959984-a41552231698'},
{name:'Twin Bell Alarm Clock',price:899,category:'Watch',sale:true,img:'https://images.unsplash.com/photo-1579992003656-0b3c3f8b28d3'},
{name:'Travel Electric Kettle',price:849,category:'Kettle',sale:false,img:'https://images.unsplash.com/photo-1606813902933-5b2f48731b06'},
{name:'Premium Sporty Chest Bag',price:699,category:'Bag',sale:true,img:'https://images.unsplash.com/photo-1591012911207-090e5da7f14b'},
{name:'Classic Design Twin Bell Alarm',price:899,category:'Watch',sale:false,img:'https://images.unsplash.com/photo-1605296867304-46d5465a13f1'}
];

let cart=[];
function renderProducts(list){
let grid=document.getElementById('productsGrid');grid.innerHTML='';
list.forEach(p=>{
let saleLabel=p.sale?'<div class="sale">Sale!</div>':'';
let card=`<div class="card">${saleLabel}<img src="${p.img}"><h3>${p.name}</h3><p class="price">৳ ${p.price}</p><button class="order-btn" onclick="addToCart('${p.name}',${p.price})">Add to Cart</button></div>`;
grid.innerHTML+=card;
});
}
renderProducts(allProducts);
function filterCategory(cat){
if(cat==='All'){renderProducts(allProducts);return;}
renderProducts(allProducts.filter(p=>p.category===cat));
}
function searchProducts(){
let q=document.getElementById('searchBar').value.toLowerCase();
renderProducts(allProducts.filter(p=>p.name.toLowerCase().includes(q)));
}

// Cart
function addToCart(name,price){cart.push({name,price});updateCart();}
function updateCart(){document.getElementById('cartCount').innerText=cart.length;renderCheckout();}
function renderCheckout(){let body='';let subtotal=0;cart.forEach(p=>{body+='<tr><td>'+p.name+'</td><td>৳ '+p.price+'</td></tr>';subtotal+=p.price;});if(cart.length==0){body='<tr><td>Cart is empty</td><td>৳ 0</td></tr>';}document.getElementById('checkoutBody').innerHTML=body;updateTotal(subtotal);}
function updateTotal(subtotal){let shippingFee=document.getElementById("shipping").value=="inside"?60:130;document.getElementById("shippingFee").innerText="৳ "+shippingFee;document.getElementById("totalPrice").innerText="৳ "+(subtotal+shippingFee);}
document.getElementById("shipping").addEventListener("change",()=>{let subtotal=cart.reduce((a,b)=>a+b.price,0);updateTotal(subtotal);});
function scrollToCheckout(){window.scrollTo({top:document.getElementById('checkout').offsetTop,behavior:'smooth'});}
function placeOrder(){if(cart.length==0){alert("Cart is empty!");return;}let name=document.getElementById('name').value,address=document.getElementById('address').value,phone=document.getElementById('phone').value;if(!name||!address||!phone){alert("দয়া করে সব required তথ্য পূরণ করুন।");return;}alert("অর্ডার কনফার্মড!\n\nProducts: "+cart.map(p=>p.name).join(", ")+"\nName: "+name+"\nAddress: "+address+"\nPhone: "+phone+"\nTotal: "+document.getElementById('totalPrice').innerText+"\nPayment: Cash on Delivery / bKash / Nagad");cart=[];updateCart();}

// Login
function openLogin(){document.getElementById('loginModal').style.display='block';}
function closeLogin(){document.getElementById('loginModal').style.display='none';}
function loginUser(){let email=document.getElementById('loginEmail').value,password=document.getElementById('loginPassword').value;if(!email||!password){alert('Login/Register Successful (Demo)');closeLogin();}}

// Order Tracking
function trackOrder(){let id=document.getElementById('orderID').value;if(!id){alert('Enter Order ID');return;}document.getElementById('trackingResult').innerText='Order '+id+' is being processed. (Demo)';}
</script>

</body>
</html>
